# ==============================================================================
# Arch Framework Installer configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# System
# ------------------------------------------------------------------------------

HOSTNAME="framework"
TIMEZONE="Europe/Zurich"
LOCALE="en_US.UTF-8"
SECONDARY_LOCALE="fr_CH.UTF-8"
KEYMAP="fr_CH"
XKB_LAYOUT="ch"
XKB_VARIANT="fr_nodeadkeys"

# ------------------------------------------------------------------------------
# Target disk
# ------------------------------------------------------------------------------

TARGET_DISK="/dev/nvme0n1"

EFI_SIZE="1GiB"
EFI_PARTITION_LABEL="EFI"
SYSTEM_PARTITION_LABEL="ARCH"

MINIMUM_DISK_SIZE="64GiB"

# ------------------------------------------------------------------------------
# Encryption
# ------------------------------------------------------------------------------

# Set both LUKS_ENABLED and TPM2_ENABLED to false for an unencrypted system.
LUKS_ENABLED="true"
LUKS_NAME="cryptroot"
TPM2_ENABLED="true"

# ------------------------------------------------------------------------------
# Filesystem
# ------------------------------------------------------------------------------

FILESYSTEM="btrfs"
BTRFS_COMPRESSION="zstd"
BTRFS_COMPRESSION_LEVEL="3"

BTRFS_SUBVOLUMES=(
    "@"
    "@home"
    "@snapshots"
    "@cache"
    "@log"
)

# ------------------------------------------------------------------------------
# Memory
# ------------------------------------------------------------------------------

SWAP_SIZE="0GiB"
ZRAM_ENABLED="true"
HIBERNATION_ENABLED="false"

# ------------------------------------------------------------------------------
# Kernel and boot
# ------------------------------------------------------------------------------

DEFAULT_KERNEL="linux-lts"
FALLBACK_KERNEL="linux"
BOOTLOADER="limine"

# ------------------------------------------------------------------------------
# Installation behavior
# ------------------------------------------------------------------------------

DRY_RUN="false"
INTERACTIVE_CONFIRMATION="true"
ENABLE_REAL_INSTALLATION="false"

# Installation target and user
MOUNT_ROOT="/mnt"
USERNAME="user"
USER_SHELL="/usr/bin/fish"
USER_GROUPS="wheel,audio,video,input,storage"

# Desktop
DESKTOP_COMPOSITOR="niri"
DESKTOP_SHELL="dank"
DESKTOP_AUTOLOGIN="true"
DMS_LOCK_ON_START="true"
